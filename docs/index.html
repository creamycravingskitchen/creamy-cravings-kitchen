<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Creamy Cravings Kitchen Pages</title>
  <style>
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: linear-gradient(135deg, #f8f1e8, #ead8c4);
      color: #2b211c;
      padding: 24px;
    }

    main {
      width: min(720px, 100%);
      background: rgba(255, 255, 255, 0.9);
      border-radius: 28px;
      padding: 32px;
      box-shadow: 0 24px 80px rgba(55, 35, 22, 0.14);
    }

    h1, p {
      margin: 0;
    }

    h1 {
      margin-top: 12px;
      font-size: clamp(2rem, 4vw, 3rem);
    }

    p {
      margin-top: 14px;
      line-height: 1.6;
      color: #6b5647;
    }

    a {
      color: #b24a22;
      font-weight: 700;
      text-decoration: none;
    }
  </style>
</head>
<body>
  <main>
    <p>Creamy Cravings Kitchen</p>
    <h1>GitHub Pages Host</h1>
    <p>This static site hosts the Plaid OAuth redirect page used by the app.</p>
    <p>Redirect page: <a href="./plaid/oauth.html">/plaid/oauth.html</a></p>
  </main>
</body>
</html>
