name: CreamyCravingsKitchen
options:
  bundleIdPrefix: com.nani
  deploymentTarget:
    iOS: "17.0"
    macOS: "14.0"
settings:
  base:
    SWIFT_VERSION: 5.9
    PRODUCT_NAME: CreamyCravingsKitchen
targets:
  CreamyCravingsKitchen:
    type: application
    platform:
      - iOS
      - macOS
    sources:
      - path: CreamyCravingsKitchen
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.nani.creamycravingskitchen
        INFOPLIST_KEY_CFBundleDisplayName: Creamy Cravings Kitchen
        INFOPLIST_KEY_LSApplicationCategoryType: public.app-category.productivity
        INFOPLIST_KEY_UIApplicationSceneManifest_Generation: true
        INFOPLIST_KEY_UIApplicationSupportsIndirectInputEvents: true
        GENERATE_INFOPLIST_FILE: true
    scheme:
      testTargets: []
